trigger:
- main

pool:
  name: MyPool

steps:

# Install Node
- task: UseNode@1
  inputs:
    version: '18.x'

# Install backend dependencies
- script: npm install
  workingDirectory: backend
  displayName: Install Backend

# Install frontend dependencies
- script: npm install
  workingDirectory: frontend
  displayName: Install Frontend

# Build React app
- script: npm run build
  workingDirectory: frontend
  displayName: Build Frontend

# Copy frontend build to backend (IMPORTANT)
- script: |
    xcopy frontend\build backend\public /E /I /Y
  displayName: Copy Frontend to Backend

# (Optional) Run tests
- script: npm test
  workingDirectory: backend
  displayName: Run Tests
  continueOnError: true

# Archive backend (with frontend included)
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(System.DefaultWorkingDirectory)/backend'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
    replaceExistingArchive: true

# Publish artifact
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
    artifactName: drop

# Deploy to Azure
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureConnection'
    appName: 'sdms-app'
    package: '$(Build.ArtifactStagingDirectory)/app.zip'